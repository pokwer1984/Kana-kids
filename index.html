<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Poky Kana">
<meta name="theme-color" content="#FF7A59">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<title>Poky Kana — Catch &amp; Learn!</title>
<style>
  :root{
    --coral:#FFA88F;
    --coral-dark:#F0876B;
    --teal:#8AD9CE;
    --teal-dark:#65C2B5;
    --purple:#A8D4F0;
    --purple-dark:#82BEE0;
    --yellow:#FFE29E;
    --yellow-dark:#F0C972;
    --ink:#5A4E70;
    --ink-soft:#9990AC;
    --card:#FFFFFF;
    --bg1:#FFF8ED;
    --bg2:#FFEDF5;
    --bg3:#EAF7FB;
    --good:#8ADCA8;
    --bad:#FFA5A0;
  }
  body.theme-blue{ --coral:#8FC2EA; --coral-dark:#6BA6D9; --bg1:#EAF4FF; --bg2:#E3EFFF; --bg3:#F0FAFF; }
  body.theme-green{ --coral:#95D3AE; --coral-dark:#72BE91; --bg1:#F0FAEC; --bg2:#E9F7E4; --bg3:#F2FCEF; }
  body.theme-pink{ --coral:#F2A8CE; --coral-dark:#E188B8; --bg1:#FFF0F7; --bg2:#FFE8F2; --bg3:#FFF5FA; }

  body.time-evening{ --bg1:#FFE7CC; --bg2:#FFD3DE; --bg3:#F0D3EF; }
  body.time-night{ --bg1:#4A4570; --bg2:#3A3560; --bg3:#2A2650; --ink:#F0EDFA; --card:#3E3868; --ink-soft:#BDB4E0; }
  body.time-night .prompt-card{ background:linear-gradient(160deg, #55507F, #4A4575); }
  body.time-night .word-badge{ background:radial-gradient(circle at 35% 28%, #6A6598, #55507F 45%, #444070 100%); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ min-height:100%; }
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 12% 8%, rgba(255,255,255,0.5), transparent 12%),
      radial-gradient(circle at 88% 14%, rgba(255,255,255,0.4), transparent 10%),
      radial-gradient(circle at 20% 92%, rgba(255,255,255,0.4), transparent 12%),
      radial-gradient(circle at 92% 85%, rgba(255,255,255,0.35), transparent 10%),
      linear-gradient(160deg, var(--bg1), var(--bg2) 55%, var(--bg3));
    font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:20px 14px 40px;
  }
  .wrap{ width:100%; max-width:480px; position:relative; z-index:1; }

  .scene-bg{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }
  .sun{
    position:absolute;
    top:5%; right:8%;
    width:86px; height:86px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFF9E0, #FFDD7A 55%, #FFC65C 100%);
    box-shadow:0 0 50px rgba(255,198,92,0.55);
    animation:sunPulse 6s ease-in-out infinite;
  }
  @keyframes sunPulse{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.06); }
  }
  .cloud{
    position:absolute;
    background:#fff;
    border-radius:50px;
    opacity:0.8;
  }
  .cloud::before, .cloud::after{
    content:"";
    position:absolute;
    background:#fff;
    border-radius:50%;
  }
  .cloud1{ width:90px; height:32px; top:12%; left:-100px; animation:driftCloud 34s linear infinite; }
  .cloud1::before{ width:44px; height:44px; top:-22px; left:10px; }
  .cloud1::after{ width:34px; height:34px; top:-14px; left:46px; }
  .cloud2{ width:70px; height:26px; top:26%; left:-100px; animation:driftCloud 46s linear infinite; animation-delay:-14s; }
  .cloud2::before{ width:34px; height:34px; top:-16px; left:8px; }
  .cloud2::after{ width:26px; height:26px; top:-10px; left:36px; }
  .cloud3{ width:60px; height:22px; top:6%; left:-100px; animation:driftCloud 40s linear infinite; animation-delay:-26s; }
  .cloud3::before{ width:28px; height:28px; top:-14px; left:6px; }
  .cloud3::after{ width:22px; height:22px; top:-8px; left:30px; }
  @keyframes driftCloud{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(calc(100vw + 200px)); }
  }
  .hill{
    position:absolute;
    left:-20%;
    width:140%;
    height:200px;
    border-radius:50%;
    opacity:0.28;
  }
  .hill1{ bottom:-150px; background:var(--teal); }
  .hill2{ bottom:-175px; left:-35%; background:var(--purple); opacity:0.18; }

  body.time-night .sun{
    background:radial-gradient(circle at 35% 30%, #FFFDF2, #E8E4F5 55%, #C9C2E8 100%);
    box-shadow:0 0 40px rgba(220,215,245,0.5);
  }
  body.time-night .cloud{ opacity:0; }
  .star-twinkle{
    position:absolute;
    width:3px; height:3px;
    background:#fff;
    border-radius:50%;
    opacity:0;
  }
  body.time-night .star-twinkle{
    animation:twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.15; }
    50%{ opacity:0.9; }
  }

  .theme-picker{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
  }
  .theme-dot{
    width:26px; height:26px;
    border-radius:50%;
    border:2.5px solid transparent;
    cursor:pointer;
  }
  .theme-dot.active{ border-color:var(--ink); }
  .theme-dot.orange{ background:#FFA88F; }
  .theme-dot.blue{ background:#8FC2EA; }
  .theme-dot.green{ background:#95D3AE; }
  .theme-dot.pink{ background:#F2A8CE; }

  .duel-turn-banner{
    text-align:center;
    font-size:18px;
    font-weight:900;
    color:var(--purple-dark);
    background:#F4F0FF;
    border-radius:16px;
    padding:12px;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .duel-turn-banner svg{ width:30px; height:30px; }
  .duel-timer{
    font-size:14px;
    font-weight:800;
    color:var(--coral);
    background:#fff;
    border-radius:10px;
    padding:3px 9px;
  }
  .player-card.on{
    box-shadow:0 0 0 3px var(--purple) inset;
    background:#EDE6FF;
  }

  .winner-blink{
    animation:winnerBlink 0.9s ease-in-out infinite;
  }
  @keyframes winnerBlink{
    0%,100%{ opacity:1; transform:scale(1); color:var(--coral); }
    50%{ opacity:0.55; transform:scale(1.06); color:var(--yellow-dark); }
  }
  .winner-row{
    background:linear-gradient(135deg, #FFF3D0, #FFE0F0);
    box-shadow:0 0 0 3px var(--yellow) inset;
    animation:winnerRowGlow 1.2s ease-in-out infinite;
  }
  @keyframes winnerRowGlow{
    0%,100%{ box-shadow:0 0 0 3px var(--yellow) inset; }
    50%{ box-shadow:0 0 0 3px var(--coral) inset; }
  }

  .eye-blink{
    animation:eyeBlink 4.5s ease-in-out infinite;
  }
  @keyframes eyeBlink{
    0%, 92%, 100%{ transform:scaleY(1); }
    95%{ transform:scaleY(0.12); }
  }

  .creature-jump{ animation:creatureJump .6s ease; }
  @keyframes creatureJump{
    0%{ transform:translateY(0) scale(1); }
    28%{ transform:translateY(-34px) scale(1.06); }
    50%{ transform:translateY(0) scale(0.94); }
    68%{ transform:translateY(-12px) scale(1.02); }
    100%{ transform:translateY(0) scale(1); }
  }
  .creature-spin{ animation:creatureSpin .7s ease; }
  @keyframes creatureSpin{
    0%{ transform:rotate(0deg) scale(1); }
    50%{ transform:rotate(180deg) scale(1.12); }
    100%{ transform:rotate(360deg) scale(1); }
  }

  .confetti-piece{
    position:fixed;
    top:-12px;
    width:8px; height:8px;
    border-radius:2px;
    z-index:250;
    animation:confettiFall linear forwards;
    pointer-events:none;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(100vh) rotate(var(--rot)); opacity:0; }
  }
  .card{
    background:var(--card);
    border-radius:28px;
    padding:22px 20px 26px;
    box-shadow:0 14px 0 rgba(122,90,160,0.14), 0 20px 40px rgba(122,90,160,0.18);
  }
  h1.brand{
    font-size:28px;
    font-weight:900;
    text-align:center;
    margin:2px 0 2px;
    color:var(--coral);
    letter-spacing:-0.01em;
  }
  .brand-sub{
    text-align:center;
    font-size:14px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:18px;
  }
  .section-title{
    font-size:13px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin:18px 0 9px;
  }
  .btn-row{ display:flex; flex-wrap:wrap; gap:10px; }
  .big-choice{
    flex:1;
    min-width:120px;
    min-height:64px;
    border:none;
    border-radius:18px;
    background:#F4F0FF;
    color:var(--ink);
    font-size:17px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 5px 0 #DCD3F5;
    transition:transform .08s ease, box-shadow .08s ease;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px;
  }
  .big-choice:active{ transform:translateY(4px); box-shadow:0 1px 0 #D3E7F5; }
  .big-choice.on{
    background:var(--purple);
    color:#fff;
    box-shadow:0 5px 0 var(--purple-dark);
  }
  .big-choice.on:active{ box-shadow:0 1px 0 var(--purple-dark); }
  .big-choice.on.teal{ background:var(--teal); box-shadow:0 5px 0 var(--teal-dark); }
  .big-choice.on.teal:active{ box-shadow:0 1px 0 var(--teal-dark); }

  .start-btn{
    width:100%;
    margin-top:22px;
    min-height:66px;
    border:none;
    border-radius:20px;
    background:var(--coral);
    color:#fff;
    font-size:21px;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 6px 0 var(--coral-dark);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .start-btn:active{ transform:translateY(5px); box-shadow:0 1px 0 var(--coral-dark); }

  .collection-link{
    width:100%;
    margin-top:12px;
    min-height:52px;
    border:none;
    border-radius:18px;
    background:var(--yellow);
    color:#7A5200;
    font-size:16px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 5px 0 var(--yellow-dark);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .collection-link:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--yellow-dark); }

  /* ---- practice ---- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .stars{
    font-size:19px;
    font-weight:900;
    color:var(--yellow-dark);
    display:flex;
    align-items:center;
    gap:5px;
  }
  .quit-btn{
    border:none;
    background:#F4F0FF;
    color:var(--ink-soft);
    font-size:14px;
    font-weight:800;
    border-radius:14px;
    padding:10px 14px;
    cursor:pointer;
  }
  .quit-btn:active{ transform:scale(0.95); }

  .mascot-row{
    display:flex;
    justify-content:center;
    margin-bottom:6px;
  }
  .mascot-row svg{ width:64px; height:64px; transition:transform .18s ease; animation:breathe 3s ease-in-out infinite; }
  .mascot-row.happy svg{ animation:bounce .5s ease; }
  .mascot-row.sad svg{ animation:wobble .4s ease; }
  @keyframes breathe{
    0%,100%{ transform:scale(1); }
    50%{ transform:scale(1.05); }
  }
  @keyframes bounce{
    0%{ transform:translateY(0) scale(1); }
    30%{ transform:translateY(-14px) scale(1.08); }
    60%{ transform:translateY(0) scale(0.97); }
    100%{ transform:translateY(0) scale(1); }
  }
  @keyframes wobble{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-8deg); }
    75%{ transform:rotate(8deg); }
  }

  .prompt-card{
    background:linear-gradient(160deg, #FFF7E8, #FFEAF5);
    border-radius:22px;
    padding:26px 16px;
    text-align:center;
    margin-bottom:16px;
    position:relative;
  }
  .speak-btn{
    position:absolute;
    top:10px; right:10px;
    width:38px; height:38px;
    border-radius:50%;
    border:none;
    background:#fff;
    font-size:17px;
    cursor:pointer;
    box-shadow:0 3px 0 rgba(122,90,160,0.15);
  }
  .speak-btn:active{ transform:translateY(2px); box-shadow:none; }
  .script-tag{
    font-size:12px;
    font-weight:800;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .prompt-kana{
    font-size:88px;
    font-weight:700;
    color:var(--ink);
    line-height:1;
  }
  .word-badge{
    width:132px; height:132px;
    margin:4px auto 0;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:radial-gradient(circle at 35% 28%, #FFFFFF, #FFF3D6 45%, #FFD9A8 100%);
    box-shadow:
      inset 0 -10px 16px rgba(180,120,40,0.18),
      inset 0 6px 10px rgba(255,255,255,0.8),
      0 10px 20px rgba(122,90,160,0.22);
  }
  .word-badge::after{
    content:"";
    position:absolute;
    top:14px; left:22px;
    width:46px; height:24px;
    border-radius:50%;
    background:rgba(255,255,255,0.55);
    transform:rotate(-18deg);
  }
  .word-badge span{
    font-size:66px;
    line-height:1;
    filter:drop-shadow(0 3px 3px rgba(0,0,0,0.18));
  }

  .answers-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
  }
  .answer-btn{
    min-height:64px;
    border:none;
    border-radius:18px;
    background:var(--teal);
    color:#fff;
    font-size:20px;
    font-weight:800;
    cursor:pointer;
    box-shadow:0 5px 0 var(--teal-dark);
    transition:transform .08s ease, box-shadow .08s ease, background .15s ease;
  }
  .answer-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--teal-dark); }
  .answer-btn.correct{ background:var(--good); box-shadow:0 5px 0 #2C9950; animation:pop .3s ease; }
  .answer-btn.wrong{ background:var(--bad); box-shadow:0 5px 0 #D94E4E; animation:shake .35s ease; }
  .answer-btn.disabled{ opacity:0.35; pointer-events:none; }
  @keyframes pop{ 0%{transform:scale(1);} 40%{transform:scale(1.08);} 100%{transform:scale(1);} }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-6px); }
    75%{ transform:translateX(6px); }
  }

  /* ---- catch overlay ---- */
  .catch-overlay{
    position:fixed; inset:0;
    background:rgba(58,46,77,0.55);
    display:flex; align-items:center; justify-content:center;
    z-index:50;
    padding:20px;
  }
  .catch-card{
    background:#fff;
    border-radius:26px;
    padding:28px 24px;
    text-align:center;
    max-width:320px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    animation:catchIn .35s cubic-bezier(.2,1.4,.4,1);
  }
  @keyframes catchIn{
    0%{ transform:scale(0.6); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  .catch-card svg{ width:120px; height:120px; }
  .catch-title{ font-size:15px; font-weight:800; color:var(--ink-soft); margin:6px 0 2px; }
  .catch-name{ font-size:24px; font-weight:900; color:var(--coral); margin-bottom:14px; }
  .catch-btn{
    border:none;
    background:var(--coral);
    color:#fff;
    font-weight:800;
    font-size:16px;
    padding:12px 28px;
    border-radius:16px;
    box-shadow:0 5px 0 var(--coral-dark);
    cursor:pointer;
  }
  .catch-btn:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--coral-dark); }

  /* ---- capture animation ---- */
  .capture-scene{
    width:160px; height:200px;
    position:relative;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    margin:0 auto 10px;
  }
  .capture-orb{
    width:70px; height:70px;
    border-radius:50%;
    background:radial-gradient(circle at 32% 30%, #FFE9C9, var(--coral) 55%, var(--purple-dark) 100%);
    box-shadow:0 10px 24px rgba(0,0,0,0.25), inset 0 -6px 10px rgba(0,0,0,0.15);
    position:relative;
    animation:orbDrop .5s cubic-bezier(.2,1.2,.5,1) forwards;
  }
  .capture-orb::before{
    content:"✦";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:#fff;
    text-shadow:0 0 6px rgba(255,255,255,0.7);
  }
  @keyframes orbDrop{
    0%{ transform:translateY(-140px) scale(0.7); opacity:0; }
    60%{ transform:translateY(0) scale(1.05); opacity:1; }
    100%{ transform:translateY(0) scale(1); }
  }
  .capture-orb.wobbling{ animation:orbWobble .35s ease-in-out 3; animation-delay:.55s; }
  @keyframes orbWobble{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-18deg); }
    75%{ transform:rotate(18deg); }
  }
  .capture-orb.bursting{ animation:orbBurst .4s ease forwards; animation-delay:1.65s; }
  @keyframes orbBurst{
    0%{ transform:scale(1); opacity:1; }
    50%{ transform:scale(1.5); opacity:0.6; }
    100%{ transform:scale(2.4); opacity:0; }
  }
  .capture-sparkle{
    position:absolute;
    left:50%; top:50%;
    width:6px; height:6px;
    border-radius:50%;
    background:var(--yellow);
    opacity:0;
    animation:sparkleOut .6s ease forwards;
    animation-delay:1.7s;
  }
  @keyframes sparkleOut{
    0%{ transform:translate(-50%,-50%) scale(0.4); opacity:1; }
    100%{ transform:translate(calc(-50% + var(--sx)), calc(-50% + var(--sy))) scale(1); opacity:0; }
  }
  .capture-caught-glow{
    position:absolute;
    left:50%; top:50%;
    width:20px; height:20px;
    border-radius:50%;
    background:radial-gradient(circle, #fff, transparent 70%);
    transform:translate(-50%,-50%) scale(0);
    animation:glowPop .5s ease forwards;
    animation-delay:1.65s;
  }
  @keyframes glowPop{
    0%{ transform:translate(-50%,-50%) scale(0); opacity:0.9; }
    100%{ transform:translate(-50%,-50%) scale(9); opacity:0; }
  }
  .capture-status{
    text-align:center;
    font-size:15px;
    font-weight:800;
    color:var(--ink-soft);
    min-height:20px;
  }
  .egg-svg{
    display:block;
    margin:0 auto 8px;
  }
  .egg-svg.egg-wobbling{
    animation:eggWobble .3s ease-in-out 4;
    transform-origin:50% 90%;
  }
  @keyframes eggWobble{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-10deg); }
    75%{ transform:rotate(10deg); }
  }
  .egg-svg.egg-hatching{
    animation:eggHatch .35s ease forwards;
  }
  @keyframes eggHatch{
    0%{ transform:scale(1); opacity:1; }
    60%{ transform:scale(1.25); opacity:0.7; }
    100%{ transform:scale(1.7); opacity:0; }
  }

  /* ---- collection ---- */
  .collection-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:12px;
    margin-top:14px;
  }
  .collection-slot{
    background:#F7F3FF;
    border-radius:16px;
    padding:10px 6px 8px;
    text-align:center;
  }
  .collection-slot.special{
    background:linear-gradient(160deg, #FFF3D0, #FFE0F0);
    border:2px solid var(--yellow-dark);
    box-shadow:0 0 0 3px rgba(255,198,92,0.25);
    position:relative;
    overflow:hidden;
  }
  .collection-slot.special::before{
    content:"✨";
    position:absolute;
    top:2px; right:6px;
    font-size:13px;
  }
  .collection-slot.shiny{
    position:relative;
    overflow:hidden;
    box-shadow:0 0 0 2px var(--yellow) inset;
  }
  .collection-slot.shiny::after{
    content:"";
    position:absolute;
    top:0; left:-60%;
    width:40%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.75), transparent);
    animation:shimmerSweep 2.6s ease-in-out infinite;
  }
  @keyframes shimmerSweep{
    0%{ left:-60%; }
    100%{ left:130%; }
  }

function shadeColor(hex, percent){
  const num = parseInt(hex.replace("#",""), 16);
  let r = (num >> 16) + Math.round(255*percent/100);
  let g = ((num >> 8) & 0x00FF) + Math.round(255*percent/100);
  let b = (num & 0x0000FF) + Math.round(255*percent/100);
  r = Math.min(255, Math.max(0, r));
  g = Math.min(255, Math.max(0, g));
  b = Math.min(255, Math.max(0, b));
  return "#" + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

function playCorrectSound(){
  const ctx = getAudioCtx(); if(!ctx) return;
  try{

    const now = ctx.currentTime;
    [880, 1108.7, 1318.5].forEach((freq,i)=>{

      gain.gain.exponentialRampToValueAtTime(0.22, t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+0.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+0.45);
    });
  }catch(e){}
}

function todayStr(){
  return new Date().toISOString().slice(0,10); // YYYY-MM-DD
}
function daysBetween(a, b){
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

/* ---- streaks ---- */
function loadStreak(){
  try{ return JSON.parse(localStorage.getItem("kanaQuestStreak_"+state.player) || '{"count":0,"lastDate":null}'); }
  catch(e){ return {count:0,lastDate:null}; }
}
function saveStreak(obj){
  try{ localStorage.setItem("kanaQuestStreak_"+state.player, JSON.stringify(obj)); }catch(e){}
}
function touchStreakForToday(){
  const streak = loadStreak();
  const today = todayStr();
  if(streak.lastDate === today) return streak;
  if(streak.lastDate){
    const gap = daysBetween(streak.lastDate, today);
    streak.count = (gap === 1) ? streak.count + 1 : 1;
  } else {
    streak.count = 1;
  }
  streak.lastDate = today;
  saveStreak(streak);
  return streak;
}

}

/* ===================== PRACTICE ===================== */
function pickScript(){
  if(state.scripts.hiragana && state.scripts.katakana) return Math.random()<0.5 ? "hiragana":"katakana";
  return state.scripts.hiragana ? "hiragana" : "katakana";
}

function nextRound(){
  const candidates = state.pool.filter(d => d.id !== state.lastId);
  const pickFrom = candidates.length ? candidates : state.pool;
  state.current = pickFrom[Math.floor(Math.random()*pickFrom.length)];
  state.lastId = state.current.id;
  if(!isPictureMode()){
    state.currentScript = pickScript();
  }

  const others = state.pool.filter(d => d.id !== state.current.id);
  const shuffled = others.sort(()=>Math.random()-0.5).slice(0,3);
  state.options = [state.current, ...shuffled].sort(()=>Math.random()-0.5);
  state.awaiting = false;
  state.wrongAttempts = 0;
  state.roundStartTime = Date.now();
  renderPractice();
}

function handleAnswer(btn){
  if(state.awaiting) return;
  const correct = btn.dataset.ansId === state.current.id;
  const mascotRow = document.getElementById("mascotRow");
  const starsEl = document.querySelector(".stars");

  if(correct){
    state.awaiting = true;
    state.consecutiveWrong = 0;
    btn.classList.add("correct");
    document.querySelectorAll(".answer-btn").forEach(b=>{ if(b!==btn) b.classList.add("disabled"); });
    mascotRow.classList.add("happy");
    const gain = isPictureMode() ? 2 : 1;
    state.stars += gain;
    if(starsEl) starsEl.textContent = "⭐ " + state.stars;
    playCorrectSound();

    // --- badges: perfect streak ---
    state.consecutiveCorrect = (state.consecutiveCorrect || 0) + 1;
    if(state.consecutiveCorrect === 10 && awardBadge("perfect10")){
      showToast("🌟 Badge earned: Perfect 10!");
      spawnConfetti();
    }
    // --- badges: speedster ---
    const elapsed = Date.now() - (state.roundStartTime || Date.now());
    if(elapsed < 3000){
      const fastKey = "kanaQuestFastCount_"+state.player;
      let fastCount = 0;
      try{ fastCount = parseInt(localStorage.getItem(fastKey) || "0", 10) || 0; }catch(e){}
      fastCount++;
      try{ localStorage.setItem(fastKey, String(fastCount)); }catch(e){}
      if(fastCount === 15 && awardBadge("speedster")){
        showToast("⚡ Badge earned: Speedster!");
        spawnConfetti();
      }
    }

    const caught = loadCaught();
    let shouldCatch = false;

    if(isAdvancedPlayer()){
      const category = state.mode === "words" ? "words" : (state.mode === "numbers" ? "numbers" : (state.letterRange === "dakuten" ? "dakuten" : state.currentScript));
      const cfg = CATEGORY_CONFIG[category];
      const catStars = loadCategoryStars();
      const before = catStars[category] || 0;
      if(before < cfg.cap){
        const after = Math.min(cfg.cap, before + gain);
        catStars[category] = after;
        saveCategoryStars(catStars);
        const beforeCount = Math.floor(before / cfg.gap);
        const afterCount = Math.floor(after / cfg.gap);
        if(afterCount > beforeCount && caught.length < CREATURES.length){
          shouldCatch = true;
        }
      }
    } else {
      const totalStars = loadTotalStars() + gain;
      saveTotalStars(totalStars);
      const nextCatchNumber = caught.length + 1;
      const needed = catchThreshold(nextCatchNumber);
      if(caught.length < CREATURES.length && totalStars >= needed){
        shouldCatch = true;
      }
    }

    if(shouldCatch){
      const uncaught = CREATURES.filter(c => !caught.includes(c.id)).sort((a,b)=>a.id-b.id);
      const newCreature = uncaught[0];
      setTimeout(()=>{
        caught.push(newCreature.id);
        saveCaught(caught);
        showCatchOverlay(newCreature);
        if(caught.length === CREATURES.length && awardBadge("fullDeck")){
          setTimeout(()=>{ showToast("👑 Badge earned: Master Collector!"); spawnConfetti(); }, 2600);
        }
      }, 700);
    } else {
      setTimeout(nextRound, 800);
    }
  } else {
    btn.classList.add("wrong");
    btn.classList.add("disabled");
    mascotRow.classList.remove("happy");
    mascotRow.classList.add("sad");
    state.stars = Math.max(0, state.stars - 1);
    state.consecutiveCorrect = 0;
    if(starsEl) starsEl.textContent = "⭐ " + state.stars;
    if(isAdvancedPlayer()){
      const category = state.mode === "words" ? "words" : (state.mode === "numbers" ? "numbers" : (state.letterRange === "dakuten" ? "dakuten" : state.currentScript));
      const catStars = loadCategoryStars();
      catStars[category] = Math.max(0, (catStars[category] || 0) - 1);
      saveCategoryStars(catStars);
    } else {
      const reducedTotal = Math.max(0, loadTotalStars() - 1);
      saveTotalStars(reducedTotal);
    }
    playTryAgainSound();
    setTimeout(()=>{ mascotRow.classList.remove("sad"); }, 400);

    state.wrongAttempts++;
    state.consecutiveWrong = (state.consecutiveWrong || 0) + 1;

    if(state.consecutiveWrong >= 5){
      state.awaiting = true;
      state.consecutiveWrong = 0;
      document.querySelectorAll(".answer-btn").forEach(b=>b.classList.add("disabled"));
      setTimeout(showPokymonLossOverlay, 500);
    } else if(state.wrongAttempts >= 2){
      state.awaiting = true;
      document.querySelectorAll(".answer-btn").forEach(b=>{
        b.classList.add("disabled");
        if(b.dataset.ansId === state.current.id){
          b.classList.add("correct");
        }
      });
      setTimeout(nextRound, 1400);
    }
  }
}

function playLossSound(){
  const ctx = getAudioCtx(); if(!ctx) return;
  try{
    if(ctx.state==="suspended") ctx.resume();
    const now = ctx.currentTime;
    [400, 340, 280].forEach((freq,i)=>{
      const t = now + i*0.16;
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.type="sawtooth"; osc.frequency.value=freq;
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.16, t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+0.22);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+0.25);
    });
  }catch(e){}
}

function makeNoiseBuffer(ctx, duration){
  const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * duration));
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i] = Math.random()*2-1; }
  return buffer;
}

function playBarkSound(ctx, dest, startTime, pitchShift){
  const baseFreq = 220 * pitchShift;
  [0, 0.26, 0.52].forEach((offset) => {
    const t = startTime + offset;
    const dur = 0.18;

    const noise = ctx.createBufferSource();
    noise.buffer = makeNoiseBuffer(ctx, dur);
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = "bandpass";
    noiseFilter.frequency.value = baseFreq * 2.5;
    noiseFilter.Q.value = 0.8;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.0001, t);
    noiseGain.gain.exponentialRampToValueAtTime(0.32, t + 0.012);
    noiseGain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(dest);
    noise.start(t); noise.stop(t + dur + 0.02);

    const osc = ctx.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(baseFreq * 1.5, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.75, t + dur * 0.8);
    const oscFilter = ctx.createBiquadFilter();
    oscFilter.type = "lowpass";
    oscFilter.frequency.value = 1500;
    const oscGain = ctx.createGain();
    oscGain.gain.setValueAtTime(0.0001, t);
    oscGain.gain.exponentialRampToValueAtTime(0.3, t + 0.018);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(oscFilter); oscFilter.connect(oscGain); oscGain.connect(dest);
    osc.start(t); osc.stop(t + dur + 0.02);
  });
}

function playMeowSound(ctx, dest, startTime, pitchShift){
  const baseFreq = 320 * pitchShift;
  [0, 0.62].forEach((offset) => {
    const t = startTime + offset;
    const dur = 0.55;
    const osc = ctx.createOscillator();
    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(baseFreq * 0.7, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, t + dur * 0.32);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.95, t + dur * 0.72);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.6, t + dur);
    const filter = ctx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 1900;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.28, t + dur * 0.15);
    gain.gain.exponentialRampToValueAtTime(0.2, t + dur * 0.6);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(filter); filter.connect(gain); gain.connect(dest);
    osc.start(t); osc.stop(t + dur + 0.02);
  });
}

function playRoarSound(ctx, dest, startTime, pitchShift){
  const baseFreq = 90 * pitchShift;
  const dur = 1.7;

  const osc = ctx.createOscillator();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(baseFreq * 0.8, startTime);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.35, startTime + dur * 0.3);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.9, startTime + dur);
  const oscFilter = ctx.createBiquadFilter();
  oscFilter.type = "lowpass";
  oscFilter.frequency.value = 550;
  const oscGain = ctx.createGain();
  oscGain.gain.setValueAtTime(0.0001, startTime);
  oscGain.gain.exponentialRampToValueAtTime(0.42, startTime + dur * 0.25);
  oscGain.gain.exponentialRampToValueAtTime(0.3, startTime + dur * 0.7);
  oscGain.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
  osc.connect(oscFilter); oscFilter.connect(oscGain); oscGain.connect(dest);
  osc.start(startTime); osc.stop(startTime + dur + 0.05);

  const noise = ctx.createBufferSource();
  noise.buffer = makeNoiseBuffer(ctx, dur);
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = "bandpass";
  noiseFilter.frequency.setValueAtTime(baseFreq * 3, startTime);
  noiseFilter.frequency.exponentialRampToValueAtTime(baseFreq * 5, startTime + dur * 0.4);
  noiseFilter.frequency.exponentialRampToValueAtTime(baseFreq * 3, startTime + dur);
  noiseFilter.Q.value = 1.5;
  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0.0001, startTime);
  noiseGain.gain.exponentialRampToValueAtTime(0.26, startTime + dur * 0.3);
  noiseGain.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
  noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(dest);
  noise.start(startTime); noise.stop(startTime + dur + 0.05);
}

function playChirpSound(ctx, dest, startTime, pitchShift){
  const baseFreq = 1900 * pitchShift;
  [0, 0.16, 0.32, 0.5, 0.68].forEach((offset) => {
    const t = startTime + offset;
    const dur = 0.13;
    const osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(baseFreq * 0.7, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.3, t + dur * 0.5);
    osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.9, t + dur);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.24, t + 0.016);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain); gain.connect(dest);
    osc.start(t); osc.stop(t + dur + 0.02);
  });
}

function playPokymonCry(creature){
  const ctx = getAudioCtx(); if(!ctx) return;
  try{
    if(ctx.state === "suspended") ctx.resume();
    const now = ctx.currentTime;
    const seed = creature.id;
    const archetype = ["bark","meow","roar","chirp"][seed % 4];
    const pitchShift = 0.85 + (seed % 5) * 0.08;

    const master = ctx.createGain();
    master.gain.value = 0.6;
    master.connect(ctx.destination);

    if(archetype === "bark") playBarkSound(ctx, master, now, pitchShift);
    else if(archetype === "meow") playMeowSound(ctx, master, now, pitchShift);
    else if(archetype === "roar") playRoarSound(ctx, master, now, pitchShift);
    else playChirpSound(ctx, master, now, pitchShift);
  }catch(e){}
}

/* ===================== DUEL MODE (isolated mini-game, doesn't touch main state) ===================== */
const duelState = {
  players: [],
  round: 0,
  totalRounds: 10,
  scores: {},
  times: {},
  currentPlayerIndex: 0,
  current: null,
  options: [],
  roundStartTime: 0,
  pool: [],
  lastId: null,
  active: false,
  timerInterval: null
};

function renderDuelPlayerSelect(){
  const players = getKnownPlayers();
  duelState.players = [];
  app.innerHTML = `
    <h1 class="brand">⚔️ Duel Mode</h1>
    <div class="brand-sub">Tap two players to battle!</div>
    <div class="player-grid">
      ${players.map(p => `
        <button class="player-card" data-duel-player="${p}">
          ${playerIconSvg(p, 64)}
          <div class="p-name">${p}</div>
        </button>
      `).join("")}

    <div class="hint" id="duelMsg" style="text-align:center;color:var(--ink-soft);font-weight:700;margin-top:10px;">Tap two players</div>
    <button class="back-btn" id="duelBack" style="margin-top:16px;">◀ Back</button>
  `;
  document.getElementById("duelBack").addEventListener("click", renderPlayerSelect);
  app.querySelectorAll("[data-duel-player]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const name = btn.dataset.duelPlayer;
      if(duelState.players.includes(name)){
        duelState.players = duelState.players.filter(p => p !== name);
        btn.classList.remove("on");
      } else if(duelState.players.length < 2){
        duelState.players.push(name);
        btn.classList.add("on");
      }
      const msg = document.getElementById("duelMsg");
      if(duelState.players.length === 2){
        startDuel();
      } else if(msg){
        msg.textContent = duelState.players.length === 1 ? `${duelState.players[0]} is ready — pick one more!` : "Tap two players";
      }
    });
  });
}

function startDuel(){
  const [p1, p2] = duelState.players;
  duelState.round = 0;
  duelState.scores = { [p1]: 0, [p2]: 0 };
  duelState.times = { [p1]: [], [p2]: [] };
  duelState.pool = ALL_DATA.filter(d => STARTER_IDS.has(d.id));
  duelState.lastId = null;
  duelState.active = true;
  nextDuelRound();
}

function nextDuelRound(){
  if(!duelState.active) return;
  if(duelState.round >= duelState.totalRounds){
    showDuelResults();
    return;
  }
  duelState.currentPlayerIndex = duelState.round % 2;
  const candidates = duelState.pool.filter(d => d.id !== duelState.lastId);
  const pickFrom = candidates.length ? candidates : duelState.pool;
  duelState.current = pickFrom[Math.floor(Math.random()*pickFrom.length)];
  duelState.lastId = duelState.current.id;
  const others = duelState.pool.filter(d => d.id !== duelState.current.id);
  const shuffled = others.sort(()=>Math.random()-0.5).slice(0,3);
  duelState.options = [duelState.current, ...shuffled].sort(()=>Math.random()-0.5);
  duelState.roundStartTime = Date.now();
  renderDuelRound();
}

function renderDuelRound(){
  const playerName = duelState.players[duelState.currentPlayerIndex];
  const d = duelState.current;
  app.innerHTML = `
    <div class="topbar">
      <div class="stars">Round ${duelState.round+1} / ${duelState.totalRounds}</div>
      <button class="quit-btn" id="duelQuitBtn">✕ Quit</button>
    </div>
    <div class="duel-turn-banner">${playerIconSvg(playerName, 30)} ${playerName}'s turn! <span class="duel-timer" id="duelTimer">0.0s</span></div>
    <div class="prompt-card">
      <div class="script-tag">Hiragana</div>
      <div class="prompt-kana">${d.h}</div>
    </div>
    <div class="answers-grid" id="duelAnswers">
      ${duelState.options.map(opt => `<button class="answer-btn" data-ans-id="${opt.id}">${opt.r}</button>`).join("")}
    </div>
  `;
  const timerEl = document.getElementById("duelTimer");
  if(duelState.timerInterval) clearInterval(duelState.timerInterval);
  duelState.timerInterval = setInterval(()=>{
    const secs = ((Date.now() - duelState.roundStartTime) / 1000).toFixed(1);
    if(timerEl) timerEl.textContent = secs + "s";
  }, 100);
  document.getElementById("duelQuitBtn").addEventListener("click", ()=>{
    clearInterval(duelState.timerInterval);
    duelState.active = false;
    renderPlayerSelect();
  });
  document.querySelectorAll("#duelAnswers .answer-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>handleDuelAnswer(btn));
  });
}

function handleDuelAnswer(btn){
  clearInterval(duelState.timerInterval);
  document.querySelectorAll("#duelAnswers .answer-btn").forEach(b=>b.classList.add("disabled"));
  const playerName = duelState.players[duelState.currentPlayerIndex];
  const correct = btn.dataset.ansId === duelState.current.id;
  const elapsed = Date.now() - duelState.roundStartTime;
  const timerEl = document.getElementById("duelTimer");
  if(timerEl) timerEl.textContent = (elapsed/1000).toFixed(1) + "s ⏱";
  if(correct){
    duelState.scores[playerName]++;
    btn.classList.add("correct");
    playCorrectSound();
  } else {
    btn.classList.add("wrong");
    playTryAgainSound();
  }
  duelState.times[playerName].push(elapsed);
  duelState.round++;
  setTimeout(nextDuelRound, 900);
}

function showDuelResults(){
  duelState.active = false;
  const [p1, p2] = duelState.players;
  const s1 = duelState.scores[p1], s2 = duelState.scores[p2];
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 999999;
  const avg1 = avg(duelState.times[p1]);
  const avg2 = avg(duelState.times[p2]);
  const tie = s1 === s2;
  let winner;
  if(s1 > s2) winner = p1;
  else if(s2 > s1) winner = p2;
  else winner = avg1 <= avg2 ? p1 : p2;

  spawnConfetti();
  playCatchFanfare();
  const perPlayerRounds = duelState.totalRounds / 2;
  app.innerHTML = `
    <h1 class="brand winner-blink">🏆 ${winner} Wins! 🏆</h1>
    <div class="brand-sub">${tie ? "Same score — fastest answers won it!" : "Great duel!"}</div>
    <div class="parent-row ${winner===p1?'winner-row':''}">
      <div class="parent-row-head"><strong>${winner===p1?'🏆 ':''}${p1}</strong><span>${s1} / ${perPlayerRounds}</span></div>
      <div class="parent-row-line">⏱ avg ${(avg1/1000).toFixed(1)}s per answer</div>
    </div>
    <div class="parent-row ${winner===p2?'winner-row':''}">
      <div class="parent-row-head"><strong>${winner===p2?'🏆 ':''}${p2}</strong><span>${s2} / ${perPlayerRounds}</span></div>
      <div class="parent-row-line">⏱ avg ${(avg2/1000).toFixed(1)}s per answer</div>
    </div>
    <button class="start-btn" id="duelAgain" style="background:var(--purple);box-shadow:0 6px 0 var(--purple-dark);">⚔️ Duel Again</button>
    <button class="back-btn" id="duelMenuBack">◀ Back to Menu</button>
  `;
  document.getElementById("duelAgain").addEventListener("click", renderDuelPlayerSelect);
  document.getElementById("duelMenuBack").addEventListener("click", renderPlayerSelect);
}

renderPlayerSelect();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
